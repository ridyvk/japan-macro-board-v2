<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description" content="3〜100桁のランダム数字を表示する記憶訓練用アプリ" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>ランダム数字</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #000000;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "Hiragino Mincho Pro", "MS Mincho", serif;
    }

    body {
      min-height: 100vh;
    }

    main {
      min-height: 100vh;
      padding: 28px 24px 40px;
      box-sizing: border-box;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .controls + .controls {
      margin-top: 10px;
    }

    label, .label {
      font-size: 16px;
    }

    input, select {
      border: 1px solid #000000;
      background: #ffffff;
      color: #000000;
      font-family: inherit;
      font-size: 18px;
      padding: 5px 8px;
      box-sizing: border-box;
    }

    input[type="number"] {
      width: 86px;
      text-align: center;
    }

    select {
      min-width: 120px;
    }

    .range, .hint, .meta {
      font-size: 14px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: 1px solid #000000;
      background: #ffffff;
      color: #000000;
      font-family: inherit;
      font-size: 16px;
      padding: 8px 18px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    #status {
      margin-top: 20px;
      font-size: 16px;
      min-height: 1.6em;
    }

    #timerDisplay {
      margin-top: 6px;
      font-size: 14px;
      min-height: 1.4em;
    }

    #result {
      margin-top: 28px;
      font-size: 34px;
      line-height: 1.9;
      letter-spacing: 0.08em;
      word-break: break-word;
      user-select: text;
      -webkit-user-select: text;
      min-height: 140px;
    }

    .placeholder {
      font-size: 18px;
      letter-spacing: normal;
    }

    #answerArea {
      margin-top: 26px;
    }

    #answerInput {
      width: 100%;
      max-width: 100%;
      font-size: 20px;
      padding: 10px;
      letter-spacing: 0.06em;
    }

    #grade {
      margin-top: 20px;
      font-size: 16px;
      line-height: 1.9;
      white-space: pre-wrap;
    }

    .hiddenText {
      letter-spacing: normal;
      font-size: 18px;
    }

    @media (min-width: 720px) {
      main {
        max-width: 820px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="controls">
      <label for="digits">桁数</label>
      <input id="digits" type="number" min="3" max="100" value="20" inputmode="numeric" />
      <span class="range">3〜100桁</span>
    </div>

    <div class="controls">
      <span class="label">表示時間</span>
      <select id="displayTime">
        <option value="5">5秒</option>
        <option value="10" selected>10秒</option>
        <option value="30">30秒</option>
        <option value="60">60秒</option>
        <option value="0">無制限</option>
      </select>

      <span class="label">区切り</span>
      <select id="groupSize">
        <option value="0">区切りなし</option>
        <option value="2">2桁</option>
        <option value="3">3桁</option>
        <option value="4">4桁</option>
        <option value="5" selected>5桁</option>
      </select>
    </div>

    <div class="buttons">
      <button id="generate">表示</button>
      <button id="hide" disabled>隠す</button>
      <button id="gradeButton" disabled>採点</button>
    </div>

    <div id="status"></div>
    <div id="timerDisplay"></div>

    <div id="result"><span class="placeholder">桁数を選んで表示</span></div>

    <div id="answerArea">
      <div class="hint">覚えた数字を入力</div>
      <input id="answerInput" type="text" inputmode="numeric" autocomplete="off" placeholder="ここに入力" />
    </div>

    <div id="grade"></div>
  </main>

  <script>
    const digitsInput = document.getElementById("digits");
    const displayTimeSelect = document.getElementById("displayTime");
    const groupSizeSelect = document.getElementById("groupSize");
    const generateButton = document.getElementById("generate");
    const hideButton = document.getElementById("hide");
    const gradeButton = document.getElementById("gradeButton");
    const result = document.getElementById("result");
    const answerInput = document.getElementById("answerInput");
    const grade = document.getElementById("grade");
    const status = document.getElementById("status");
    const timerDisplay = document.getElementById("timerDisplay");

    let currentNumber = "";
    let revealTimer = null;
    let countdownTimer = null;
    let remainingSeconds = 0;
    let isHidden = false;

    function clampDigits(value) {
      const parsed = Number.parseInt(String(value), 10);
      if (Number.isNaN(parsed)) return 3;
      return Math.min(100, Math.max(3, parsed));
    }

    function sanitizeAnswer(value) {
      return String(value).replace(/\D/g, "");
    }

    function randomDigit() {
      if (window.crypto && window.crypto.getRandomValues) {
        const array = new Uint8Array(1);
        window.crypto.getRandomValues(array);
        return array[0] % 10;
      }
      return Math.floor(Math.random() * 10);
    }

    function formatNumber(number) {
      const groupSize = Number(groupSizeSelect.value);
      if (!number) return "";
      if (!groupSize) return number;
      const regex = new RegExp(`.{1,${groupSize}}`, "g");
      return (number.match(regex) || []).join("  ");
    }

    function clearTimers() {
      if (revealTimer) {
        clearTimeout(revealTimer);
        revealTimer = null;
      }
      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
      timerDisplay.textContent = "";
    }

    function renderNumber() {
      if (!currentNumber) {
        result.innerHTML = '<span class="placeholder">桁数を選んで表示</span>';
        return;
      }
      if (isHidden) {
        result.innerHTML = '<span class="hiddenText">非表示</span>';
        return;
      }
      result.textContent = formatNumber(currentNumber);
    }

    function setStatus(text) {
      status.textContent = text;
    }

    function startCountdown(seconds) {
      remainingSeconds = seconds;
      timerDisplay.textContent = `残り ${remainingSeconds} 秒`;
      countdownTimer = setInterval(() => {
        remainingSeconds -= 1;
        if (remainingSeconds > 0) {
          timerDisplay.textContent = `残り ${remainingSeconds} 秒`;
        } else {
          clearInterval(countdownTimer);
          countdownTimer = null;
          timerDisplay.textContent = "時間終了";
        }
      }, 1000);
    }

    function generateNumber() {
      clearTimers();
      const length = clampDigits(digitsInput.value);
      digitsInput.value = String(length);
      const parts = [];
      for (let i = 0; i < length; i++) {
        let digit = randomDigit();
        if (i === 0) {
          while (digit === 0) digit = randomDigit();
        }
        parts.push(String(digit));
      }
      currentNumber = parts.join("");
      isHidden = false;
      answerInput.value = "";
      grade.textContent = "";
      renderNumber();
      hideButton.disabled = false;
      gradeButton.disabled = false;
      answerInput.focus();

      const displayTime = Number(displayTimeSelect.value);
      if (displayTime > 0) {
        setStatus(`${length}桁を表示中`);
        startCountdown(displayTime);
        revealTimer = setTimeout(() => {
          hideNumber();
          timerDisplay.textContent = "時間終了";
        }, displayTime * 1000);
      } else {
        setStatus(`${length}桁を表示中`);
        timerDisplay.textContent = "無制限";
      }
    }

    function hideNumber() {
      if (!currentNumber || isHidden) return;
      clearTimers();
      isHidden = true;
      renderNumber();
      setStatus("数字を隠しました");
      hideButton.disabled = true;
      gradeButton.disabled = false;
      answerInput.focus();
    }

    function gradeAnswer() {
      if (!currentNumber) return;
      const userAnswer = sanitizeAnswer(answerInput.value);
      answerInput.value = userAnswer;

      if (!userAnswer) {
        grade.textContent = "解答を入力してから採点";
        return;
      }

      let correctCount = 0;
      const mismatchPositions = [];
      const maxLength = Math.max(currentNumber.length, userAnswer.length);

      for (let i = 0; i < maxLength; i++) {
        const expected = currentNumber[i] || "";
        const actual = userAnswer[i] || "";
        if (expected === actual && expected !== "") {
          correctCount += 1;
        } else {
          mismatchPositions.push(i + 1);
        }
      }

      const accuracy = ((correctCount / currentNumber.length) * 100).toFixed(1);
      const mismatchPreview = mismatchPositions.length
        ? mismatchPositions.slice(0, 20).join(", ") + (mismatchPositions.length > 20 ? " ..." : "")
        : "なし";

      grade.textContent =
`正解率：${accuracy}%\n一致：${correctCount}/${currentNumber.length}桁\n入力桁数：${userAnswer.length}\nミス位置：${mismatchPreview}`;

      setStatus("採点しました");
    }

    digitsInput.addEventListener("blur", () => {
      digitsInput.value = String(clampDigits(digitsInput.value));
    });

    answerInput.addEventListener("input", () => {
      answerInput.value = sanitizeAnswer(answerInput.value);
    });

    groupSizeSelect.addEventListener("change", renderNumber);
    generateButton.addEventListener("click", generateNumber);
    hideButton.addEventListener("click", hideNumber);
    gradeButton.addEventListener("click", gradeAnswer);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }
  </script>
</body>
</html>
