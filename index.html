<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Japan Macro Board — v2</title>
  <meta name="theme-color" content="#0f1115">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='100%' height='100%' rx='12' ry='12' fill='%231f2333'/><circle cx='22' cy='22' r='10' fill='%238ab4ff'/><circle cx='44' cy='44' r='12' fill='%23ffd166'/></svg>">
  <style>
    :root{
      --bg:#0f1115;
      --card:#171923;
      --panel:#131521;
      --text:#e6e6ea;
      --muted:#a3a3ac;
      --accent:#8ab4ff;
      --good:#5ad187;
      --bad:#ff6b6b;
      --warn:#ffd166;
      --border:#25283b;
      --chip:#1f2333;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:linear-gradient(180deg,#0f1115 0%,#0d0f18 100%);
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans JP", sans-serif;
      letter-spacing: .02em;
    }
    header{
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 20px; border-bottom:1px solid var(--border);
      position:sticky; top:0; background:rgba(13,15,24,.75); backdrop-filter:saturate(160%) blur(8px);
      z-index:10;
      gap:12px;
      flex-wrap:wrap;
    }
    header .title{ display:flex; align-items:center; gap:12px; }
    .logo{ width:28px;height:28px;border-radius:8px;background:radial-gradient(circle at 30% 30%,#8ab4ff,transparent 50%),radial-gradient(circle at 70% 70%,#ffd166,transparent 50%),linear-gradient(135deg,#1f2333,#101322); border:1px solid #2b2f44; box-shadow:0 0 0 1px #0b0d15 inset; }
    .title h1{font-size:16px; margin:0}
    .title .sub{color:var(--muted); font-size:12px}
    .wrap{ display:grid; grid-template-columns: 1fr 300px; gap:16px; padding:16px; min-height: calc(100% - 60px); }
    .main{ min-height:60vh; }
    .cards{ display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:14px; }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px 14px 10px; box-shadow: 0 10px 30px rgba(0,0,0,.24); display:flex; flex-direction:column; gap:10px; min-height:230px; }
    .card h3{margin:0; font-size:14px; display:flex; align-items:center; gap:8px}
    .badge{ font-size:11px; color:var(--muted); background:var(--chip); border:1px solid var(--border); padding:2px 8px; border-radius:999px; }
    .headline{ display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
    .headline .value{font-size:28px; font-weight:700}
    .headline .unit{font-size:13px; color:var(--muted)}
    .headline .date{font-size:12px; color:var(--muted); margin-left:auto}
    .spark{height:100px}
    canvas{width:100%; height:100%}
    .footer-note{margin-top:8px; color:var(--muted); font-size:11px}
    .sidebar{ position:sticky; top:68px; height:fit-content; display:flex; flex-direction:column; gap:10px; background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:12px; }
    .sidebar h2{font-size:13px; margin:4px 6px 8px; color:var(--muted)}
    .btn{ width:100%; appearance:none; border:none; background:#22263a; color:#eaeaf0; padding:10px 12px; border-radius:12px; font-size:14px; cursor:pointer; border:1px solid var(--border); text-align:left; display:flex; align-items:center; justify-content:space-between; gap:10px; transition: transform .04s ease, background .2s ease, border-color .2s ease; }
    .btn:hover{background:#242945}
    .btn:active{transform: translateY(1px)}
    .btn .small{font-size:11px; color:var(--muted)}
    .btn.primary{background:#2a3152}
    .row{display:flex; gap:8px; align-items:center}
    a.link{color:var(--accent); text-decoration:none}
    .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:8px}
    .notice{font-size:12px; color:var(--muted); margin-top:8px}
    .delta{ font-size:12px; color:var(--muted); display:flex; gap:10px; flex-wrap:wrap; }
    .delta .chip{ background:var(--chip); border:1px solid var(--border); border-radius:999px; padding:2px 8px; display:inline-flex; align-items:center; gap:6px; }
    .delta .arrow{ font-weight:700; }
    .live-badges{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .live-badges .chip{ background:var(--chip); border:1px solid var(--border); color:var(--muted); font-size:12px; border-radius:999px; padding:4px 10px; }
    @media (max-width: 980px){
      .wrap{grid-template-columns: 1fr}
      .sidebar{position:static}
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <div class="title">
      <div class="logo"></div>
      <div>
        <h1>Japan Macro Board <span class="badge">v2</span></h1>
        <div class="sub">統計ダッシュボード WebAPI／YoY・MoM対応／PWA</div>
      </div>
    </div>
    <div class="row">
      <div class="live-badges">
        <span class="chip" id="last-updated">最終更新 —</span>
        <span class="chip">公表直後は反映に数分ラグの可能性</span>
      </div>
      <button class="btn" id="btn-refresh-all" title="R">全部更新</button>
      <a class="btn" href="https://dashboard.e-stat.go.jp/static/api" target="_blank" rel="noopener">APIドキュメント</a>
    </div>
  </header>

  <div class="wrap">
    <main class="main">
      <div class="cards" id="cards"></div>
      <div class="notice">※ データは <a class="link" target="_blank" rel="noopener" href="https://dashboard.e-stat.go.jp/">統計ダッシュボード</a>のAPIから取得。公開直後は反映までタイムラグがあることがあります。</div>
    </main>

    <aside class="sidebar">
      <h2>日本の重要指標</h2>
      <button class="btn primary" data-key="all">全部まとめて</button>
      <div class="grid-2">
        <button class="btn" data-key="cpi">CPI（総合）</button>
        <button class="btn" data-key="unemp">失業率（季調）</button>
        <button class="btn" data-key="jobs">有効求人倍率（季調）</button>
        <button class="btn" data-key="realw">実質賃金（現金給与）</button>
        <button class="btn" data-key="iip">鉱工業生産（季調）</button>
        <button class="btn" data-key="coincident">景気動向指数（一致）</button>
        <button class="btn" data-key="gdpn">GDP（名目・支出・季調）</button>
      </div>
      <div class="notice">
        レイアウト: 中央にメイン画面 / 右側にボタン。<br/>
        YoY / MoM（四半期はYoY / QoQ）を自動計算して表示します。
      </div>
      <div class="notice">PWA：HTTPSでホストするとホーム画面に追加できます。</div>
    </aside>
  </div>

  <script>
    // PWA: register service worker (HTTPS/localhost only)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(console.error);
      });
    }

    const API = "https://dashboard.e-stat.go.jp/api/1.0/Json/getData";
    const INDICATORS = {
      cpi: {
        name: "消費者物価指数（総合）2020年基準",
        indicatorCode: "0703010501010090000",
        cycle: 1, seasonal: 1,
        unitHint: "", source: "総務省統計局",
        doc: "https://dashboard.e-stat.go.jp/timeSeriesResult?indicatorCode=0703010501010090000"
      },
      unemp: {
        name: "（季節調整値）完全失業率（男女計）",
        indicatorCode: "0301010000020020010",
        cycle: 1, seasonal: 2,
        unitHint: "%", source: "総務省統計局",
        doc: "https://dashboard.e-stat.go.jp/timeSeriesResult?indicatorCode=0301010000020020010"
      },
      jobs: {
        name: "（季節調整値）有効求人倍率",
        indicatorCode: "0301020001000010010",
        cycle: 1, seasonal: 2,
        unitHint: "倍", source: "厚生労働省",
        doc: "https://dashboard.e-stat.go.jp/timeSeriesResult?indicatorCode=0301020001000010010"
      },
      realw: {
        name: "実質賃金指数（現金給与総額）",
        indicatorCode: "0302030201010090010",
        cycle: 1, seasonal: 1,
        unitHint: "", source: "厚生労働省（毎月勤労統計）",
        doc: "https://dashboard.e-stat.go.jp/timeSeriesResult?indicatorCode=0302030201010090010"
      },
      iip: {
        name: "（季節調整値）鉱工業生産指数（2015年基準）",
        indicatorCode: "0502070201000090010",
        cycle: 1, seasonal: 2,
        unitHint: "", source: "経済産業省",
        doc: "https://dashboard.e-stat.go.jp/share/shareGraph?Cycle=1&IndicatorCode=0502070201000090010&IsSeasonalAdjustment=2&RegionCode=00000&RegionLevel=2&RegionalRank=2"
      },
      coincident: {
        name: "景気動向指数（一致）2020年基準",
        indicatorCode: "0706010500000090010",
        cycle: 1, seasonal: 1,
        unitHint: "", source: "内閣府",
        doc: "https://dashboard.e-stat.go.jp/timeSeriesResult?indicatorCode=0706010500000090010"
      },
      gdpn: {
        name: "（季節調整値）国内総生産（支出側）（名目）2015年基準（10億円）",
        indicatorCode: "0705010401000010000",
        cycle: 2, seasonal: 2,
        unitHint: "10億円", source: "内閣府",
        doc: "https://dashboard.e-stat.go.jp/timeSeriesResult?indicatorCode=0705010401000010000"
      }
    };

    function buildUrl({indicatorCode, cycle, seasonal}){
      const params = new URLSearchParams({
        Lang: "JP",
        IndicatorCode: indicatorCode,
        RegionLevel: "2",
        RegionCode: "00000",
        RegionalRank: "2",
        Cycle: String(cycle),
        IsSeasonalAdjustment: String(seasonal),
        MetaGetFlg: "Y",
        SectionHeaderFlg: "1"
      });
      return API + "?" + params.toString();
    }

    async function fetchSeries(key){
      const meta = INDICATORS[key];
      const url = buildUrl(meta);
      const res = await fetch(url);
      if(!res.ok) throw new Error("API error: " + res.status);
      const json = await res.json();
      const path = json?.GET_STATS?.STATISTICAL_DATA;
      const dataObjs = path?.DATA_INF?.DATA_OBJ || [];
      const series = dataObjs
        .filter(d => d?.VALUE && d?.VALUE["@indicator"] === meta.indicatorCode)
        .map(d => ({
          timeCode: d.VALUE["@time"] || d.VALUE["@timeCode"] || "",
          value: d.VALUE["$"] !== undefined ? Number(d.VALUE["$"]) : null,
          regionCode: d.VALUE["@regionCode"]
        }))
        .filter(d => d.value !== null);
      let unit = "";
      try{
        const classes = path?.CLASS_INF?.CLASS_OBJ;
        const indicatorClasses = Array.isArray(classes) ? classes.find(c => Array.isArray(c.CLASS) && c["@id"]?.toUpperCase() === "INDICATOR") || classes[0] : null;
        if(indicatorClasses){
          const match = indicatorClasses.CLASS.find(c => c["@code"] === meta.indicatorCode);
          if(match && match["@name"]) meta.name = match["@name"];
          if(match && match["@unit"]) unit = match["@unit"];
        }
      }catch(e){}
      if(!unit) unit = meta.unitHint || "";
      series.sort((a,b)=> a.timeCode.localeCompare(b.timeCode));
      const latest = series[series.length - 1] || null;
      return {meta, series, latest, unit};
    }

    function formatTimeLabel(timeCode){
      if(!timeCode) return "";
      if(/^\d{4}M\d{2}$/.test(timeCode)){
        const y=timeCode.slice(0,4), m=timeCode.slice(5,7);
        return `${y}年${Number(m)}月`;
      }
      if(/^\d{4}Q\d$/.test(timeCode)){
        const y=timeCode.slice(0,4), q=timeCode.slice(5,6);
        return `${y}年${q}Q`;
      }
      if(/^\d{4}CY/.test(timeCode)){
        const y=timeCode.slice(0,4); return `${y}年`;
      }
      if(/^\d{4}FY/.test(timeCode)){
        const y=timeCode.slice(0,4); return `${y}年度`;
      }
      return timeCode;
    }

    function createCard(key){
      const wrap = document.createElement("div");
      wrap.className = "card";
      wrap.id = `card-${key}`;
      wrap.innerHTML = `
        <h3><span>${INDICATORS[key].name}</span> <span class="badge">${INDICATORS[key].source}</span></h3>
        <div class="headline">
          <div class="value" id="val-${key}">—</div>
          <div class="unit" id="unit-${key}"></div>
          <div class="date" id="date-${key}"></div>
        </div>
        <div class="delta" id="delta-${key}">
          <span class="chip">—</span>
        </div>
        <div class="spark"><canvas id="chart-${key}" aria-label="${INDICATORS[key].name}"></canvas></div>
        <div class="footer-note">
          <a class="link" target="_blank" rel="noopener" href="${INDICATORS[key].doc}">元データ</a> ／ <span class="small">IndicatorCode: <code>${INDICATORS[key].indicatorCode}</code></span>
        </div>
      `;
      return wrap;
    }

    const charts = {};
    function drawChart(key, series){
      const el = document.getElementById("chart-"+key);
      const labels = series.slice(-60).map(p => formatTimeLabel(p.timeCode));
      const values = series.slice(-60).map(p => p.value);
      if(charts[key]) charts[key].destroy();
      charts[key] = new Chart(el.getContext("2d"), {
        type: "line",
        data: { labels, datasets: [{ label: INDICATORS[key].name, data: values, tension:.2, fill:false }]},
        options: {
          responsive:true,
          maintainAspectRatio:false,
          plugins:{ legend:{ display:false }, tooltip:{ intersect:false, mode:"index" } },
          scales:{ x:{ ticks:{ maxRotation:0, autoSkip:true, autoSkipPadding:8 } }, y:{ beginAtZero:false } }
        }
      });
    }

    function setHeadline(key, latest, unit){
      const vEl = document.getElementById("val-"+key);
      const uEl = document.getElementById("unit-"+key);
      const dEl = document.getElementById("date-"+key);
      if(latest){
        vEl.textContent = latest.value.toLocaleString("ja-JP");
        uEl.textContent = unit || "";
        dEl.textContent = formatTimeLabel(latest.timeCode) + " 時点";
      }else{
        vEl.textContent = "—"; uEl.textContent = ""; dEl.textContent = "取得できませんでした";
      }
    }

    function pct(a,b){
      if(a==null || b==null || b===0) return null;
      return (a/b - 1);
    }
    function fmtPct(x){
      if(x==null || !isFinite(x)) return "—";
      const v = (x*100);
      const f = Math.abs(v) >= 1 ? v.toFixed(1) : v.toFixed(2);
      return (v>0? "+" : (v<0? "" : "±")) + f + "%";
    }
    function arrow(x){
      if(x==null || !isFinite(x)) return "→";
      const v = x*100;
      if(Math.abs(v) < 0.05) return "→";
      return v>0 ? "↑" : "↓";
    }
    function setDelta(key, series, cycle){
      const el = document.getElementById("delta-"+key);
      const n = series.length;
      if(n < (cycle===2?5:13)){ el.innerHTML = "<span class='chip'>データ不足</span>"; return; }
      const stepPrev = 1;
      const stepYoY  = (cycle===2?4:12);
      const stepPrev2 = stepPrev+1;
      const stepYoY2  = stepYoY+1;

      const cur = series[n-1].value;
      const prev = series[n-1-stepPrev].value;
      const prev2 = series[n-1-stepPrev2]?.value ?? null;
      const yoBase = series[n-1-stepYoY].value;
      const yoPrevBase = series[n-1-stepYoY2]?.value ?? null;

      const mom = pct(cur, prev);
      const momPrev = pct(prev, prev2);
      const yoy = pct(cur, yoBase);
      const yoyPrev = pct(prev, yoPrevBase);

      const isQuarter = cycle===2;
      const momLabel = isQuarter ? "前期比" : "前月比";
      const yoyLabel = "前年比";

      el.innerHTML = `
        <span class="chip"><span class="arrow">${arrow(mom)}</span> ${momLabel}: <strong>${fmtPct(mom)}</strong>（前回 ${fmtPct(momPrev)}）</span>
        <span class="chip"><span class="arrow">${arrow(yoy)}</span> ${yoyLabel}: <strong>${fmtPct(yoy)}</strong>（前回 ${fmtPct(yoyPrev)}）</span>
      `;
    }

    function updateLastUpdated(){
      const el = document.getElementById("last-updated");
      const now = new Date();
      const jst = now.toLocaleString("ja-JP", { timeZone: "Asia/Tokyo", hour12:false });
      el.textContent = "最終更新 " + jst + " JST";
    }

    async function loadOne(key){
      try{
        const card = document.getElementById("card-"+key) || (document.getElementById("cards").appendChild(createCard(key)));
        const {series, latest, unit, meta} = await fetchSeries(key);
        drawChart(key, series);
        setHeadline(key, latest, unit);
        setDelta(key, series, meta.cycle);
        updateLastUpdated();
      }catch(err){
        console.error(err);
        alert(INDICATORS[key].name + " の取得に失敗: " + err.message);
      }
    }

    async function loadAll(){
      const keys = Object.keys(INDICATORS);
      for(const k of keys){ await loadOne(k); }
    }

    // Sidebar and header buttons
    document.querySelectorAll(".sidebar .btn").forEach(btn => {
      btn.addEventListener("click", async (e)=>{
        const key = e.currentTarget.dataset.key;
        if(key === "all") { await loadAll(); }
        else { await loadOne(key); }
      });
    });
    document.getElementById("btn-refresh-all").addEventListener("click", loadAll);

    // Keyboard shortcuts
    document.addEventListener("keydown", (e)=>{
      if(e.key.toLowerCase()==="r"){ loadAll(); }
      const num = parseInt(e.key,10);
      if(!isNaN(num)){
        const keys = Object.keys(INDICATORS);
        const target = keys[num-1];
        if(target){ loadOne(target); }
      }
    });

    // Render placeholder cards on load
    const cardsEl = document.getElementById("cards");
    for(const key of Object.keys(INDICATORS)){ cardsEl.appendChild(createCard(key)); }
  </script>
</body>
</html>
